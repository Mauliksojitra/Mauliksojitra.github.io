### ☆ Serverless - Pay for use
- First, you don’t manage the servers.
- You only handle writing and running the code.

- **Serverless = Consumption-Based Pricing**
    - You only pay for what you use.
    - No charges when your app or database is idle.
    - No need to pre-purchase or reserve resources.
1) Functions
2) Container App
3) Kubernetes
4) SQL Database
5) Consmos DB

    1) DTU
        - Fixed performance level (S1, S2, etc)
    2) vCore 
        - You choose CPU, Memory, Storage
    3) Serverless
        - Autoscale CPU, Memory based on usage

- Auto scale - 0.5 to 80 vCores
- You’re charged per vCore-second and used.
- It can pause when idle, cutting costs entirely.

- Azure Functions is a classic serverless example

|-------------------------------------|-------------------------------------------|

        - Software bugs

## ☆ Availability Zone

### Three Types of Availability Zone Services

1. **Zonal Services**
    - You can choose a specific Availability Zone to deploy the service to
    - You then should deploy a duplicate service to another zone to achieve resiliency
    - E.g. Virtual Machines

2. **Zone-Redundant Services**
    - Automatically deployed across zones for you
    - You don’t have to configure it
    - E.g. Azure SQL Database

3. **Always Available Services**
    - These are global services and Microsoft takes care of the ensuring that they are always on
    - Also called “Non-regional services”
    - E.g. Azure Portal, Entra ID (formerly Azure Active Directory), Azure Front Door

### 2. Networking Services
- Virtual Network / VNets (IaaS)  
    - By default, two virtual machines in Azure are not allowed to talk with each other – security!
    - Address space - IPv4 or IPv6 addresses
    - These are private addresses

- Subnet
    - All VNets are subdivided into one or more subnets
    - The subnet is assigned a range of IP addresses which must exist in the address space of the parent VNet
    - All virtual machines must belong to at least one subnet, using a Network Interface Card (NIC)
    - Some VMs have more than one NIC and can connect to more than one subnet
    - VMs can optionally be assigned a public IP, which makes it eligible to be accessed from outside Azure (subnet to security/firewalls)

    **Network Security Group (NSG)**
    - An access control list (ACL) that blocks traffic inbound and outbound from a subnet unless it matches certain rules
    - The rules are based on source IP, source port, destination IP, destination port, and protocol(5-tuple match)
    - You can allow communication between different subnets on the same network through adding specific NSG rules
    - No traffic passes the NSG filter unless an “ALLOW” rule matches
    - Rules have priorities, and the highest priority rule that matches is the one that applies

    **Peering**
    - Communication is blocked between two subnets on different networks
    - Connecting two subnets together is called peering
    - This allows communication between a VM on one network and a VM on a different network


    **Azure DNS**
    - DNS stands for Domain Name System
    - You can give your IP addresses names using a DNS
    - DNS only applies internally to Azure to applied networks


    **Azure VPN Gateway**
    - VPN is Virtual Private Network
    - Allows communication between a workstation and a network, or between two networks
    - Encrypts traffic between those two points

    **VPNs**
    - Outside of Azure, VPNs require a physical device to be installed on a network
    - Inside of Azure, you can install a VPN Gateway as a virtual device on your network
    - VPN Gateway requires its own subnet

    **Connectivity Options**
    - Point-to-Point VPN
    - Site-to-Site VPN
    - Azure ExpressRoute

    **ExpressRoute**
    - If communicating into Azure at high speeds is important to you, you might want to look into ExpressRoute
    - A private connection from your ISP to an Azure endpoint
    - Bypasses the public Internet

### Comparing Endpoints

| Feature | Public Endpoint (With Internet Access) | Public Endpoint + Specified Network | Private Endpoint |
|--------|----------------------------------------|-------------------------------------|------------------|
| IP Type | Public IP | Public IP | Private IP |
| Accessibility | Accessible from anywhere on the Internet | Accessible from Internet and selected networks | Accessible only from within your VNet |
| Traffic Flow | Traffic can go to the public Internet (SSL) | Traffic from selected networks stays in Azure | Traffic never travels the public Internet |
| Network Control | No restrictions | Can filter IP ranges | Restricted to private network only |



### 3. Storage Account (IaaS)
- **UnMannaged** - Container (Blob) storage (GPV)

        - A setting when creating a GPv2 acct

    - **Premium Options**
        - Blob – can only hold containers (blobs)
            - Can choose block blobs or page blobs
        - File Storage
        - Uses premium SSD (solid state disks)
        - Triple the “operations per second (OPS)”
        - Lower latency (time to first byte)
        - More expensive

    - **High Performance**
       - Premium SSD  
       - Premium SSD2  
       - Ultra Disk  


2. **Container Storage - (Blob storage)** 
    - Binary Large Object (BLOB)
    - These are files of any type (TXT, PDF, ZIP, CSV, XLSX, JPG, AVI, … whatever)
    - Stored loosely in a container
    - Public or private
    - “Unstructured data”


    -  **Container Storage**
        - Create multiple containers
        - Each container can contain blobs
        - Can be organized into folders (yes and no)
        - Only pay for what you use

    - **Redundancy**
        - Azure keeps 3 copies of your data by default
        - Locally- or zone-redundant
        - Azure will almost never, ever lose a file once it’s successfully received it


    - **Global Redundancy**
        - You can choose global redundancy for
        - Azure keeps 6 copies of your data
        - 3 locally, and 3 in another region of the “geo”
        - Honors data sovereignty laws 

    - **Access Tiers**  
        - Hot – the default, balanced access
        - Cool – can be set as default, cheaper with more expensive read/write operations
        - Cold – much cheaper , more expensive read/write operations
        - Archive – cannot get immediate access to files, cheapest , most expensive operations

    - **Failover**
        - Hard disks fail every so often
        - Azure takes care of this without you doing anything
        - 3 copies of your data, they can recreate a hard disk behind the scenes
